<div class="page">
  <div class="card">
    <div class="card-header">
      <span class="icon">📚</span>
      <h2>{{ tab === 'register' ? 'הרשמההההה' : 'כניסה' }}</h2>
      <p>{{ tab === 'register' ? 'הצטרף והתחל ללמוד עם AI' : 'ברוך השב אלינו!' }}</p>
    </div>

    <div class="tabs">
      <button [class.active]="tab === 'login'" (click)="switchTab('login')">כניסה</button>
      <button [class.active]="tab === 'register'" (click)="switchTab('register')">הרשמה</button>
    </div>

    <div class="form">
      <div class="field">
        <label>שם מלא</label>
        <input [(ngModel)]="name" placeholder="הכנס שם מלא" />
      </div>
      <div class="field">
        <label>טלפון</label>
        <input [(ngModel)]="phone" placeholder="הכנס מספר טלפון" />
      </div>
      <p *ngIf="error" class="error">{{ error }}</p>
      <button class="submit-btn" (click)="tab === 'register' ? register() : login()">
        {{ tab === 'register' ? 'הירשם' : 'כניסה' }}
      </button>
    </div>
  </div>
</div>
